# Full-history versioning check. Validates that the BHoM .NET assemblies in
# the most recent published release still deserialise every historical JSON
# dataset (test_all=true) without regression.
#
# Decoupled from build-installer.yml (see 2026-06-15 session note). Mirrors
# BHoMBot's separation of concerns: `_alphaInstallerTimer` produced the .msi;
# `_testingTimer` ran the equivalent of `RunVersioning("full")` two hours
# later, independently. The signal is about assemblies, not about packaging.
#
# Trigger model:
#   workflow_dispatch    The only declared trigger. Used in two modes.
#
#                        Auto-fired by build-installer.yml's publish job
#                        immediately after a successful alpha-beta or
#                        beta release. The publish job sets release_tag
#                        to the just-published tag. The chain is wired
#                        as an explicit workflow_dispatch (not a
#                        release: published trigger) because Releases
#                        created by softprops/action-gh-release are
#                        authored by GITHUB_TOKEN, and GITHUB_TOKEN-
#                        authored events do not chain to downstream
#                        workflows (GitHub's loop-protection).
#                        workflow_dispatch is the exempt trigger.
#
#                        Ad-hoc from the Actions UI with optional
#                        overrides:
#                          - versioning_toolkit_repo: fork override for
#                            the repo containing .ci/code/Verification.sln
#                          - test_toolkit_repo: fork override
#                          - additional_dataset_repos: newline-separated
#                            extra dataset-source repos to clone and
#                            build, so their PostBuildEvents stage
#                            supplementary datasets alongside
#                            Versioning_Toolkit's own
#                          - release_tag: validate a specific historical
#                            release instead of the latest. Useful for
#                            retrospective regression-hunting on shipped
#                            builds.
#
# Retrospective replay (release_tag input):
#   When release_tag is set, the workflow validates that specific .msi
#   instead of the latest. Versioning_Toolkit and Test_Toolkit are still
#   cloned at develop, not at the release_tag's publish date. Releases
#   are immutable and the test framework evolves additively (new datasets,
#   new upgraders), so running today's framework against an older .msi
#   surfaces latent regressions that the framework caught up to identify
#   after the release shipped. The runner's IsFromLoadedNamespace filter
#   scopes out tests for types the older .msi cannot load, so new-dataset
#   noise is handled at runtime without false positives.
#
# Does not gate any PR (per the 2026-06-15 architecture review: full-history
# is the ecosystem-wide catch-everything safety net, while the per-PR
# Versioning check (CI_Toolkit/ci-versioning.yml) is the gating
# author-attributable signal). However, the workflow itself fails when a
# regression is detected, so its conclusion (and any status badge derived
# from it) reflects the actual state of the most recent shipped artefact.
# Infrastructure-only failure paths (clone fail, msi download fail, etc.)
# still emit ::warning:: and exit 0 so they do not flap the badge on
# transient issues.
#
# Extending this workflow for another org (e.g. BHE's BuroHappold_Installer,
# or any third-party fork): see docs/extending.md. In particular, the
# additional_dataset_repos input is the canonical mechanism for wiring in
# private dataset sources (Revit API mocks, BHE-only toolkits, etc.) without
# modifying this file. Defaults in this workflow MUST stay BHoM-org-neutral.

name: Versioning (Full History)

on:
  workflow_dispatch:
    inputs:
      versioning_toolkit_repo:
        description: |
          Repo containing Versioning_Toolkit (owner/repo). Must expose
          .ci/code/Verification.sln whose PostBuildEvent stages historical
          datasets to C:\ProgramData\BHoM\Datasets\TestSets\Versioning.
          Mirrors the input of the same name on ci-versioning.yml.
        type: string
        required: false
        default: 'BHoM/Versioning_Toolkit'
      test_toolkit_repo:
        description: |
          Repo containing Test_Toolkit (owner/repo). Override to point at a
          fork in your org. Provides Test_Engine.dll / Test_oM.dll that
          Versioning_Test.csproj references via HintPath. Mirrors the input
          of the same name on ci-versioning.yml.
        type: string
        required: false
        default: 'BHoM/Test_Toolkit'
      additional_dataset_repos:
        description: |
          Newline-separated list of additional repos (owner/repo) to clone
          and build before running tests. Each repo's .ci/code/Verification.sln
          PostBuildEvent stages supplementary versioning datasets alongside
          the primary Versioning_Toolkit's. Mirrors the input of the same
          name on ci-versioning.yml. Use this to stage datasets from a
          private or org-specific dataset source (e.g. a Revit API mock fork
          maintained outside the BHoM org).
        type: string
        required: false
        default: ''
      release_tag:
        description: |
          Validate a specific release tag (e.g. v9.2.0-alpha.260615) instead
          of the most recent. Leave blank to run against the latest published
          release. Useful for retrospective regression-hunting.
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: versioning-full-history
  cancel-in-progress: false

jobs:
  versioning:
    name: Full-history versioning
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Locate target release
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:INPUT_RELEASE_TAG
          if (-not $tag) {
              # Most recent published release. Includes pre-releases (alpha,
              # rc) and final. Sorted by publish time descending.
              $tag = gh release list `
                  --repo "$env:GITHUB_REPOSITORY" `
                  --limit 1 `
                  --json tagName `
                  --jq '.[0].tagName'
          }

          if (-not $tag) {
              Write-Host "::notice title=Full-history versioning::No published release found. Nothing to validate. Self-heals on the next nightly publish."
              "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              return
          }

          Write-Host "::notice title=Full-history versioning::Target release: $tag"
          "tag=$tag"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download .msi from release
        if: steps.target.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path msi | Out-Null
          gh release download "$env:TAG" `
              --repo "$env:GITHUB_REPOSITORY" `
              --pattern "*.msi" `
              --dir msi
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::Failed to download .msi for $env:TAG. Skipping."
              exit 0
          }
          $msi = Get-ChildItem msi -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) {
              Write-Host "::warning title=Full-history versioning::Release $env:TAG has no .msi attached. Skipping."
              exit 0
          }
          Write-Host "Downloaded: $($msi.Name) ($([math]::Round($msi.Length / 1MB, 2)) MB)"

      - name: Install .msi (populate Assemblies)
        if: steps.target.outputs.skip == 'false'
        run: |
          $msi = Get-ChildItem msi -Filter '*.msi' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
              Write-Host "::warning title=Full-history versioning::No .msi available to install. Skipping."
              exit 0
          }

          # /passive: progress UI but no user interaction; /L*V: verbose log
          # for failure diagnosis.
          $p = Start-Process msiexec `
              -ArgumentList '/i', $msi.FullName, '/L*V', 'install.log', '/passive' `
              -Wait -PassThru
          if ($p.ExitCode -ne 0) {
              Write-Host "::warning title=Full-history versioning::msiexec /i failed with exit $($p.ExitCode). Skipping. See install.log artefact."
              exit 0
          }

          $assembliesDir = 'C:\ProgramData\BHoM\Assemblies'
          $dllCount = (Get-ChildItem $assembliesDir -Filter '*.dll' -ErrorAction SilentlyContinue | Measure-Object).Count
          Write-Host "::notice title=Full-history versioning::Installed. Assemblies in ${assembliesDir}: $dllCount DLLs."

      - name: Sanity-check Assemblies population
        if: steps.target.outputs.skip == 'false'
        run: |
          # Defends against silent partial-install: msiexec returned 0 but the
          # .msi was missing dep payloads (or a packaging-side PostBuildEvent
          # failed to stage them at build time). VersioningRunner would
          # otherwise reflect over an incomplete set and report "no failures"
          # because the types it expected to test simply are not loaded —
          # giving a misleading green run.
          #
          # Filter mirrors VersioningRunner's own assembly-suffix rules
          # (oM/_Engine/_Adapter, plus Revit-versioned). Test_*.dll excluded
          # because it is staged by a later step, not by the .msi install.
          # Floor (20) is conservative against current BHoM dep counts (~38
          # in recent manifests; each typically contributes 1-3 BHoM DLLs).
          # Lifting the floor over time is reasonable as BHoM grows; do not
          # tie it directly to the dep manifest because that couples this
          # workflow to packaging-side schema.
          $bhomDlls = @(Get-ChildItem 'C:\ProgramData\BHoM\Assemblies' -Filter '*.dll' -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match '(oM|_Engine|_Adapter)\.dll$' -or $_.Name -match 'Revit_\w+20\d{2}\.dll$' })
          $count = $bhomDlls.Count
          $floor = 20
          Write-Host "::notice title=Full-history versioning::BHoM dep DLLs in Assemblies: $count (floor: $floor)."
          if ($count -lt $floor) {
              Write-Host "::error title=Full-history versioning::Assemblies appears incomplete ($count BHoM-suffix DLLs, expected at least $floor). The .msi install may have been partial, or a packaging-side PostBuildEvent may have silently failed. Aborting before versioning to avoid a misleading green run."
              exit 1
          }

      - name: Clone Versioning_Toolkit + Test_Toolkit
        if: steps.target.outputs.skip == 'false'
        env:
          VERSIONING_TOOLKIT_REPO: ${{ inputs.versioning_toolkit_repo || 'BHoM/Versioning_Toolkit' }}
          TEST_TOOLKIT_REPO:       ${{ inputs.test_toolkit_repo || 'BHoM/Test_Toolkit' }}
        run: |
          # Versioning_Toolkit provides .ci/code/Verification.sln and the
          # historical datasets. Test_Toolkit provides Test_Engine.dll and
          # Test_oM.dll that Versioning_Test.csproj references via HintPath
          # to $(ProgramData)\BHoM\Assemblies (those DLLs are NOT in the
          # alpha installer's payload, matching BHoMBot's separation).

          $codeLocation = $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path $codeLocation | Out-Null

          $vtkName = ($env:VERSIONING_TOOLKIT_REPO -split '/')[1]
          git clone --depth 1 --branch develop "https://github.com/$($env:VERSIONING_TOOLKIT_REPO).git" "$codeLocation\$vtkName" 2>&1 | ForEach-Object { Write-Host "  $_" }
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::Versioning_Toolkit clone failed for '$($env:VERSIONING_TOOLKIT_REPO)' (exit $LASTEXITCODE). Skipping."
              exit 0
          }

          $testToolkitName = ($env:TEST_TOOLKIT_REPO -split '/')[1]
          git clone --depth 1 --branch develop "https://github.com/$($env:TEST_TOOLKIT_REPO).git" "$codeLocation\$testToolkitName" 2>&1 | ForEach-Object { Write-Host "  $_" }
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::Test_Toolkit clone failed for '$($env:TEST_TOOLKIT_REPO)' (exit $LASTEXITCODE). Skipping."
              exit 0
          }

      - name: Build Test_Toolkit (stage Test_Engine.dll + Test_oM.dll)
        if: steps.target.outputs.skip == 'false'
        env:
          TEST_TOOLKIT_REPO: ${{ inputs.test_toolkit_repo || 'BHoM/Test_Toolkit' }}
        run: |
          $testToolkitName = ($env:TEST_TOOLKIT_REPO -split '/')[1]
          $sln = Join-Path $env:GITHUB_WORKSPACE "$testToolkitName\$testToolkitName.sln"
          if (-not (Test-Path $sln)) {
              Write-Host "::warning title=Full-history versioning::No solution at $sln. Skipping."
              exit 0
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) {
              Write-Host "::warning title=Full-history versioning::MSBuild not located via vswhere. Skipping."
              exit 0
          }

          & nuget restore $sln -Verbosity quiet
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::NuGet restore failed for $sln (exit $LASTEXITCODE). Skipping."
              exit 0
          }

          & $msbuild $sln -nologo -verbosity:minimal -p:Configuration=Release
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::MSBuild failed for $sln (exit $LASTEXITCODE). Skipping."
              exit 0
          }

          $staged = Get-ChildItem 'C:\ProgramData\BHoM\Assemblies' -Filter 'Test_*.dll' -ErrorAction SilentlyContinue
          Write-Host "::notice title=Full-history versioning::Test_Toolkit staged. Test_*.dll in Assemblies: $($staged.Count)"

      - name: Build additional dataset repos (stage supplementary datasets)
        if: steps.target.outputs.skip == 'false' && inputs.additional_dataset_repos != ''
        env:
          ADDITIONAL_DATASET_REPOS: ${{ inputs.additional_dataset_repos }}
        run: |
          # Clone + build each additional repo's .ci/code/Verification.sln.
          # PostBuildEvents stage extra historical datasets into
          # C:\ProgramData\BHoM\Datasets\TestSets\Versioning alongside the
          # primary Versioning_Toolkit's. Fail-soft per repo so a single
          # missing or broken dep does not drop the whole run.

          $repos = $env:ADDITIONAL_DATASET_REPOS -split "`n" |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ -ne '' }

          if ($repos.Count -eq 0) { return }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) {
              Write-Host "::warning title=Full-history versioning::MSBuild not located via vswhere. Skipping additional dataset repos."
              exit 0
          }

          foreach ($repo in $repos) {
              $repoName = ($repo -split '/')[1]
              if (-not $repoName) {
                  Write-Host "::warning title=Full-history versioning::Skipping '$repo' — not in owner/repo format."
                  continue
              }

              $repoDir = Join-Path $env:GITHUB_WORKSPACE $repoName
              git clone --depth 1 --branch develop "https://github.com/$repo.git" $repoDir 2>&1 | ForEach-Object { Write-Host "  $_" }
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "::warning title=Full-history versioning::Clone failed for '$repo'. Skipping."
                  continue
              }

              $sln = Join-Path $repoDir '.ci\code\Verification.sln'
              if (-not (Test-Path $sln)) {
                  Write-Host "::warning title=Full-history versioning::'$repo' has no .ci\code\Verification.sln. Skipping."
                  continue
              }

              & nuget restore $sln -Verbosity quiet
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "::warning title=Full-history versioning::NuGet restore failed for '$repo'. Skipping build."
                  continue
              }

              & $msbuild $sln -nologo -verbosity:minimal -p:Configuration=Release
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "::warning title=Full-history versioning::MSBuild failed for '$repo'. Continuing without this dataset."
                  continue
              }

              Write-Host "::notice title=Full-history versioning::Staged datasets from $repo."
          }

      - name: Build Verification.sln
        if: steps.target.outputs.skip == 'false'
        env:
          VERSIONING_TOOLKIT_REPO: ${{ inputs.versioning_toolkit_repo || 'BHoM/Versioning_Toolkit' }}
        run: |
          $vtkName = ($env:VERSIONING_TOOLKIT_REPO -split '/')[1]
          $verSln = Join-Path $env:GITHUB_WORKSPACE "$vtkName\.ci\code\Verification.sln"
          if (-not (Test-Path $verSln)) {
              Write-Host "::warning title=Full-history versioning::Verification.sln not found at $verSln. Skipping."
              exit 0
          }

          dotnet restore $verSln
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::dotnet restore failed for $verSln (exit $LASTEXITCODE). Skipping."
              exit 0
          }

          # Pick the Release config that the .sln actually declares. Mirrors
          # ci-versioning.yml's logic so behaviour is consistent between the
          # per-PR check and this workflow.
          $slnContent = Get-Content $verSln -Raw
          $verConfig = if ($slnContent -match '\bRelease\|Any CPU\b') {
              'Release'
          } else {
              $m = [regex]::Matches($slnContent, 'Release\w+(?=\|Any CPU)')
              if ($m.Count -gt 0) { $m[0].Value } else { 'Release' }
          }
          Write-Host "::notice title=Full-history versioning::Building Verification.sln with config '$verConfig'."

          dotnet build $verSln --no-restore -c $verConfig --nologo
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning title=Full-history versioning::dotnet build failed for $verSln (exit $LASTEXITCODE). Skipping."
              exit 0
          }

      - name: Prepare VersioningRunner
        id: fh-runner
        if: steps.target.outputs.skip == 'false'
        uses: BuroHappoldEngineeringAdmin/CI_Toolkit/.github/actions/prepare-runner@main
        with:
          runner_project: tools/VersioningRunner/src/VersioningRunner/VersioningRunner.csproj
          output_dir: out\versioning-runner
          configuration: Release
          cache_prefix: versioning-runner
          source_dir: tools/VersioningRunner/src
          dotnet_version: '8.0'

      - name: Run versioning (full-history)
        id: fh-run
        if: steps.target.outputs.skip == 'false'
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\Build" | Out-Null

          & "${{ steps.fh-runner.outputs.runner_exe }}" `
              --assemblies "C:\ProgramData\BHoM\Assemblies" `
              --test-all `
              --output "$env:GITHUB_WORKSPACE\Build\versioning-fullhistory.json"

          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error title=Full-history versioning::Regression detected (exit code $LASTEXITCODE). See the attached versioning-fullhistory-${{ github.run_id }} artefact."
              exit $LASTEXITCODE
          }
          Write-Host "::notice title=Full-history versioning::All historical dataset versions pass."

      - name: Upload full-history result
        if: always() && steps.target.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: versioning-fullhistory-${{ github.run_id }}
          path: ${{ github.workspace }}/Build/versioning-fullhistory.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload install log on failure
        if: failure() && steps.target.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: msiexec-install-log-${{ github.run_id }}
          path: install.log
          if-no-files-found: ignore
          retention-days: 7
